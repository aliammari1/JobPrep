name: 💡 Feature Request
description: Suggest a new feature or enhancement for JobPrep AI
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: I would like to see...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: I also thought about...

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of the application does this feature affect?
      options:
        - Mock Interviews
        - CV Builder
        - Code Challenges
        - Cover Letter Generator
        - Authentication / Login
        - Dashboard / Analytics
        - Settings / Profile
        - Chrome Extension
        - API / Backend
        - UI/UX
        - Performance
        - Accessibility
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical (Blocking my work)
        - High (Would significantly improve my experience)
        - Medium (Nice to have)
        - Low (Minor improvement)
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: Describe how you would use this feature
      placeholder: |
        As a user, I would...
        This would help me...
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Provide examples from other applications or mockups
      placeholder: |
        LinkedIn has a similar feature...
        Here's a rough mockup of what I'm thinking...

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: (Optional) If you have ideas on how to implement this, share them here
      placeholder: This could be implemented by...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or links about the feature request

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you like to contribute to this feature?
      options:
        - label: I'm willing to submit a PR to implement this feature
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues and discussions
          required: true
        - label: This is not a duplicate of an existing feature request
          required: true
        - label: I have read the [Contributing Guidelines](https://github.com/aliammari1/JobPrep/blob/main/CONTRIBUTING.md)
          required: true
